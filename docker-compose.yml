services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finpilot
      POSTGRES_PASSWORD: finpilot
      POSTGRES_DB: finpilot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finpilot"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://finpilot:finpilot@db:5432/finpilot
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      # Дефолты дружелюбны к локальному запуску: `docker compose up` поднимается из коробки
      # по HTTP. Для прода переопредели в .env: ENVIRONMENT=production, COOKIE_SECURE=true,
      # стойкий JWT_SECRET (openssl rand -hex 32). Дефолтный секрет в production отвергается
      # самим приложением (fail-loud при старте) — защита на правильном слое.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me-in-production-env-32b}
      DEFAULT_BASE_CURRENCY: ${DEFAULT_BASE_CURRENCY:-RUB}
      # B2B/Plaid выключены, пока не заданы ключи.
      B2B_API_KEYS: ${B2B_API_KEYS:-}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      # Почта: задайте в файле .env рядом с docker-compose.yml (см. инструкцию).
      # Пока пусто — письма выключены, подтверждение идёт по ссылке.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    ports:
      - "8000:8000"

volumes:
  pgdata:
    name: finpilot_pgdata

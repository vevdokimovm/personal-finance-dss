services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finpilot
      POSTGRES_PASSWORD: finpilot
      POSTGRES_DB: finpilot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finpilot"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://finpilot:finpilot@db:5432/finpilot
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      # Secure-cookie включена по умолчанию (прод за HTTPS-прокси). Для локального
      # HTTP-теста через Docker задайте COOKIE_SECURE=false и ENVIRONMENT=development.
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      # Обязателен: старт падает, если не задан, — не оставляем публичный дефолт-секрет.
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (min 32 chars; openssl rand -hex 32)}
      DEFAULT_BASE_CURRENCY: ${DEFAULT_BASE_CURRENCY:-RUB}
      # B2B/Plaid выключены, пока не заданы ключи.
      B2B_API_KEYS: ${B2B_API_KEYS:-}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      # Почта: задайте в файле .env рядом с docker-compose.yml (см. инструкцию).
      # Пока пусто — письма выключены, подтверждение идёт по ссылке.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    ports:
      - "8000:8000"

volumes:
  pgdata:
    name: finpilot_pgdata

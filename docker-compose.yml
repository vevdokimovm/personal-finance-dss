services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finpilot
      POSTGRES_PASSWORD: finpilot
      POSTGRES_DB: finpilot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finpilot"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://finpilot:finpilot@db:5432/finpilot
      ENVIRONMENT: production
      CORS_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
      # В проде задайте свой секрет (env/secrets), не оставляйте дефолт.
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars-secret}
      DEFAULT_BASE_CURRENCY: ${DEFAULT_BASE_CURRENCY:-RUB}
      # B2B/Plaid выключены, пока не заданы ключи.
      B2B_API_KEYS: ${B2B_API_KEYS:-}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
    ports:
      - "8000:8000"

volumes:
  pgdata:
    name: finpilot_pgdata

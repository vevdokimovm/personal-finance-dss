# ════════════════════════════════════════════════════════════════════════════
# FINPILOT — production compose: web (gunicorn) + PostgreSQL + Nginx (TLS)
# ════════════════════════════════════════════════════════════════════════════
# Отличия от dev (docker-compose.yml):
#   • наружу торчит ТОЛЬКО nginx (80/443); web и db — во внутренней сети, без ports;
#   • секреты строго из .env (НЕ из dev-дефолтов) — fail-loud работает как задумано;
#   • restart: unless-stopped — контейнеры поднимаются сами после сбоя/ребута;
#   • том finpilot_pgdata сохранён (BUG-010: иначе данные теряются при redeploy).
#
# Запуск:  docker compose -f docker-compose.prod.yml up -d --build
# Перед первым запуском получи TLS-сертификат (см. docs/DEPLOY.md).
# ════════════════════════════════════════════════════════════════════════════

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: finpilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD не задан в .env}
      POSTGRES_DB: finpilot
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Loopback-привязка хоста: скрипты backup/restore/verify на хосте работают
    # с БД напрямую. Наружу НЕ публикуется (только 127.0.0.1).
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finpilot"]
      interval: 5s
      timeout: 3s
      retries: 5
    # Без ports: база недоступна из интернета, только из внутренней сети compose.

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # Все боевые секреты — из .env (JWT_SECRET, ADMIN_API_KEY, TOKEN_ENCRYPTION_KEY,
    # SMTP_*, COOKIE_SECURE, CORS_ORIGINS, LEGAL_* и т.д.).
    env_file:
      - .env
    environment:
      # DATABASE_URL собирается из одного источника правды — POSTGRES_PASSWORD.
      DATABASE_URL: postgresql+psycopg://finpilot:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD не задан в .env}@db:5432/finpilot
      # Форсим прод-режим независимо от .env (страховка от случайного development).
      ENVIRONMENT: production
    expose:
      - "8000"
    # Loopback-привязка хоста: cron и локальный дебаг на сервере бьют напрямую
    # в http://127.0.0.1:8000 без выхода в интернет. Наружу НЕ публикуется
    # (только 127.0.0.1), доступ извне — исключительно через nginx (443).
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Без ports: приложение доступно снаружи только через nginx.

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Подставляется в шаблон конфига (envsubst). FILTER ограничивает замену
      # только переменной DOMAIN — nginx-переменные ($host, $uri) не трогаются.
      DOMAIN: ${DOMAIN:?DOMAIN не задан в .env}
      NGINX_ENVSUBST_FILTER: DOMAIN
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      # TLS-сертификаты Let's Encrypt с хоста (получаются certbot, см. DEPLOY.md).
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Webroot для ACME-challenge при автообновлении сертификата.
      - ./nginx/www:/var/www/certbot
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
    name: finpilot_pgdata

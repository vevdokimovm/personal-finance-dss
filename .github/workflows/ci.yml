name: CI

# Три категории тестов (см. docs/testing_infrastructure.md):
#   fast  — каждый push/PR: unit + integration + property + e2e-smoke (chromium), гейт 90%.
#   full  — на тегах vX.Y.Z и вручную: мультибраузер E2E + визуальная регрессия + live-a11y + security.
#   deep  — вручную и еженедельно: стресс-property (тысячи примеров) + мутационное тестирование.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"   # понедельник 03:00 UTC — глубокий прогон
  workflow_dispatch:       # ручной запуск full/deep

jobs:
  # ── (1) БЫСТРЫЙ — БЛОКИРУЮЩИЙ гейт. Матрица SQLite + PostgreSQL, покрытие ≥ 90%. ──
  fast:
    name: Быстрый (${{ matrix.db }})
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, postgresql]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: finpilot
          POSTGRES_PASSWORD: finpilot
          POSTGRES_DB: finpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finpilot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      SECRET_KEY: test-secret-key-for-ci
      DATABASE_URL: ${{ matrix.db == 'postgresql' && 'postgresql+psycopg://finpilot:finpilot@localhost:5432/finpilot_test' || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Быстрые тесты + покрытие (unit + integration + property, порог 90%)
        run: |
          coverage run -m pytest -m fast
          coverage report
      - name: E2E-smoke (chromium)
        run: |
          playwright install --with-deps chromium
          pytest -m e2e --browser chromium

  # ── Линтеры: ИНФОРМАЦИОННЫЙ job (не блокирует). ──────────────────────────────
  lint:
    name: Линтеры (информационно)
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: flake8
        run: flake8 .
      - name: mypy
        run: mypy app --config-file=.mypy.ini
      - name: pylint
        run: pylint app --rcfile=.pylintrc

  # ── (2) ПОЛНЫЙ — на тегах vX.Y.Z и вручную. Здесь CDN Playwright доступен, ──
  #    поэтому реально гоняются firefox и webkit (в песочнице CDN заблокирован).
  full:
    name: Полный (мультибраузер + визуал + a11y + security)
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: test-secret-key-for-e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt pillow
      - name: Установка браузеров (chromium + firefox + webkit)
        run: playwright install --with-deps chromium firefox webkit
      - name: Мультибраузерные E2E (chromium + firefox + webkit)
        run: pytest -m e2e --browser chromium --browser firefox --browser webkit
      - name: Полный тир (визуальная регрессия + live-a11y)
        run: pytest -m full --browser chromium
      - name: Security — статанализ кода (bandit)
        run: |
          pip install -q bandit
          bandit -q -r app -ll
      - name: Security — аудит зависимостей (pip-audit)
        run: |
          pip install -q pip-audit
          pip-audit -r requirements.txt
      - name: Нагрузка — smoke locust (headless, коротко)
        run: |
          pip install -q locust
          SECRET_KEY=x uvicorn app.main:app --port 8000 &
          sleep 5
          locust -f loadtest/locustfile.py --headless -u 20 -r 5 -t 30s --host http://127.0.0.1:8000 || true

  # ── (3) ГЛУБОКИЙ — вручную и еженедельно. Стресс-property + мутации. ─────────
  deep:
    name: Глубокий (стресс-property + мутации)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: test-secret-key-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Стресс-property (тысячи примеров)
        run: pytest -m deep
      - name: Мутационное тестирование ядра (mutmut)
        run: |
          pip install -q mutmut
          mutmut run --paths-to-mutate app/core || true
          mutmut results || true

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Тесты + покрытие: БЛОКИРУЮЩИЙ гейт. Матрица на двух СУБД: ───────────────
  #    SQLite (быстро) и PostgreSQL (ловит то, что SQLite прячет — FK и пр.).
  #    coverage report падает, если покрытие < 90% (порог в .coveragerc).
  test:
    name: Тесты и покрытие (${{ matrix.db }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, postgresql]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: finpilot
          POSTGRES_PASSWORD: finpilot
          POSTGRES_DB: finpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finpilot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      SECRET_KEY: test-secret-key-for-ci
      # Для sqlite — пусто (conftest сам поднимет временный SQLite).
      DATABASE_URL: ${{ matrix.db == 'postgresql' && 'postgresql+psycopg://finpilot:finpilot@localhost:5432/finpilot_test' || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Тесты + покрытие (порог 90%)
        run: |
          coverage run -m pytest
          coverage report

  # ── Линтеры: ИНФОРМАЦИОННЫЙ job (continue-on-error). Показывает замечания ──
  #    в логах, но не блокирует merge. Когда код почистят (P1.4) — убрать
  #    continue-on-error, и линтеры станут блокирующими.
  lint:
    name: Линтеры (информационно)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: flake8
        run: flake8 .
      - name: mypy
        run: mypy app --config-file=.mypy.ini
      - name: pylint
        run: pylint app --rcfile=.pylintrc

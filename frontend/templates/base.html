<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PersFin СППР — Интеллектуальная система поддержки принятия финансовых решений">
    <title>{% block title %}{{ project_name }}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <div class="brand-logo">PF</div>
                <div class="brand-text">
                    <div class="brand-title">PersFin</div>
                    <div class="brand-subtitle">Алгоритмы · СППР</div>
                </div>
            </div>

            <nav class="side-nav" aria-label="Основная навигация">
                <a href="/dashboard" id="nav-dashboard" class="nav-item {% if request.url.path == '/dashboard' or request.url.path == '/' %}active{% endif %}">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    </span>
                    <span>Обзор</span>
                </a>
                <a href="/planning" id="nav-planning" class="nav-item {% if request.url.path == '/planning' %}active{% endif %}">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    </span>
                    <span>Прогнозирование</span>
                </a>
                <a href="/transactions" id="nav-transactions" class="nav-item {% if request.url.path == '/transactions' %}active{% endif %}">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    </span>
                    <span>Операции</span>
                </a>
                <a href="/obligations" id="nav-obligations" class="nav-item {% if request.url.path == '/obligations' %}active{% endif %}">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </span>
                    <span>Обязательства</span>
                </a>
                <a href="/goals" id="nav-goals" class="nav-item {% if request.url.path == '/goals' %}active{% endif %}">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                    </span>
                    <span>Цели</span>
                </a>
                <a href="/banks" id="nav-banks" class="nav-item {% if request.url.path == '/banks' %}active{% endif %}">
                    <span class="nav-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                    </span>
                    <span>Банки</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button class="secondary-button w-full" type="button" id="load-demo-button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Загрузить демо
                </button>
                <button class="secondary-button danger-button w-full" type="button" id="clear-demo-button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 6px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    Очистить
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h2>{% block page_title %}Главная{% endblock %}</h2>
                <div class="user-profile">
                    <span class="status-indicator online"></span>
                    Система активна
                </div>
            </header>

            <div class="page-container">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    {% block modals %}{% endblock %}

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>

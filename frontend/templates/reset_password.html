{% extends "base.html" %}
{% block page_title %}Сброс пароля{% endblock %}
{% block content %}
<div class="legal-doc" style="max-width:460px;">
    <h1>Новый пароль</h1>
    <p class="legal-intro">Задайте новый пароль для входа в FINPILOT.</p>

    <div id="reset-form-wrap">
        <label class="field-label" for="new_password">Новый пароль (минимум 8 символов)</label>
        <input type="password" id="new_password" class="modal-input" autocomplete="new-password"
               style="margin:6px 0 14px; width:100%;">

        <label class="field-label" for="confirm_password">Повторите пароль</label>
        <input type="password" id="confirm_password" class="modal-input" autocomplete="new-password"
               style="margin:6px 0 18px; width:100%;">

        <button id="reset-submit" class="primary-button" type="button" style="padding:10px 24px;">
            Сохранить пароль
        </button>
    </div>

    <p id="reset-msg" style="margin-top:16px; font-size:.9rem;"></p>
    <p id="reset-login-link" style="margin-top:8px; display:none;">
        <a href="/">Перейти ко входу</a>
    </p>
</div>
{% endblock %}
{% block scripts %}
<script>
(function () {
    const token = "{{ reset_token }}";
    const btn = document.getElementById("reset-submit");
    const msg = document.getElementById("reset-msg");
    const wrap = document.getElementById("reset-form-wrap");
    const loginLink = document.getElementById("reset-login-link");

    if (!token) {
        msg.textContent = "Ссылка для сброса некорректна. Запросите сброс пароля заново.";
        wrap.style.display = "none";
        return;
    }

    btn.addEventListener("click", async function () {
        const pwd = document.getElementById("new_password").value;
        const confirm = document.getElementById("confirm_password").value;
        msg.textContent = "";

        if (pwd.length < 8) {
            msg.textContent = "Пароль должен быть не короче 8 символов.";
            return;
        }
        if (pwd !== confirm) {
            msg.textContent = "Пароли не совпадают.";
            return;
        }

        btn.disabled = true;
        try {
            const resp = await fetch("/api/auth/reset-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token: token, new_password: pwd }),
            });
            const data = await resp.json();
            if (resp.ok) {
                wrap.style.display = "none";
                msg.textContent = data.detail || "Пароль обновлён.";
                loginLink.style.display = "block";
            } else {
                msg.textContent = data.detail || "Не удалось сбросить пароль.";
                btn.disabled = false;
            }
        } catch (e) {
            msg.textContent = "Сетевая ошибка. Попробуйте ещё раз.";
            btn.disabled = false;
        }
    });
})();
</script>
{% endblock %}

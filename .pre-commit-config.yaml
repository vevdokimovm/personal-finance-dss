repos:
  - repo: https://github.com/psf/black
    rev: 23.3.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.3.0
    hooks:
      - id: mypy
        args: ["--config-file=.mypy.ini"]
        additional_dependencies:
          - pydantic
          - types-requests

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        args: ["--max-line-length=100", "--extend-ignore=F403,F405,F401", "--exclude=.venv,venv,__pycache__,.mypy_cache,alembic,build,dist"]

  - repo: https://github.com/PyCQA/pylint
    rev: v3.2.7
    hooks:
      - id: pylint
        args: ["--rcfile=.pylintrc"]
        additional_dependencies:
          - fastapi
          - sqlalchemy
          - pydantic
          - pydantic-settings
          - jinja2
          - alembic
          - pdfplumber
          - bcrypt
          - PyJWT
          - cryptography
          - email-validator
          - python-multipart
          - pytest
          - httpx

  - repo: local
    hooks:
      - id: pytest
        name: Run pytest
        entry: bash -c "SECRET_KEY=test-secret-key-for-ci pytest -v"
        language: system
        pass_filenames: false

      - id: coverage
        name: Check test coverage
        entry: bash -c "SECRET_KEY=test-secret-key-for-ci coverage run -m pytest && coverage report"
        language: system
        pass_filenames: false

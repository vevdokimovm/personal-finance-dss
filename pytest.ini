[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q --strict-markers -m "not e2e and not full and not deep"
markers =
    e2e: браузерные end-to-end тесты (требуют Playwright + браузер). Запуск: pytest -m e2e
    property: property-based инварианты ядра (hypothesis). Запуск: pytest -m property
    fast: быстрый прогон (unit + integration + property + e2e-smoke) — каждый push. Авто-маркер.
    full: предрелизный прогон (визуальная регрессия, live-a11y) — перед тегом. Запуск: pytest -m full
    deep: глубокий прогон (стресс-property, мутации) — редко/вручную. Запуск: pytest -m deep
